name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Hermetic safety net: any test that reaches getAuthClient() fails fast
  # with a named ENOENT instead of timing out on metadata-server discovery.
  GOOGLE_APPLICATION_CREDENTIALS: /nonexistent
  GCE_METADATA_HOST: 127.0.0.1:1
  NO_GCE_CHECK: 'true'

jobs:
  lint:
    name: 🧹 Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  test-unit:
    name: 🧪 Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:unit
        env:
          NODE_OPTIONS: --test-reporter=spec

  test-integration-fake:
    name: 🧪 Integration (fake backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:integration:fake

  test-smoke:
    name: 💨 Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:smoke
